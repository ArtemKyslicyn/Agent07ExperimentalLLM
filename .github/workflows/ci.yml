name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test --enable-code-coverage

      - name: Coverage report
        if: always()
        run: |
          BIN=$(find .build/arm64-apple-macosx/debug -name '*PackageTests.xctest' -type d | head -1)
          xcrun llvm-cov report \
            "$BIN/Contents/MacOS/$(basename "$BIN" .xctest)" \
            --instr-profile=.build/debug/codecov/default.profdata \
            --ignore-filename-regex='\.build|Tests|checkouts' \
            2>/dev/null | tail -5 || true
